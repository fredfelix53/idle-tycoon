<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Idle Tycoon</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="shopBtn" onclick="ShopUI.open()">🛒 Shop</button>
  <div id="gameContainer">
    <div id="header">
      <h1>💰 Idle Tycoon</h1>
      <div class="stat-item">
        <div class="label">Multiplier</div>
        <div class="value" style="color:#ffd700;font-size:18px" id="prestigeMulti">1x</div>
      </div>
    </div>
    <div id="statsBar">
      <div class="stat-item">
        <div class="label">Coins</div>
        <div class="value" id="coins" style="color:#ffd700">50</div>
      </div>
      <div class="stat-item">
        <div class="label">Per Second</div>
        <div class="value" id="rate" style="color:#00ff88;font-size:16px">0/s</div>
      </div>
    </div>
    <div id="tapArea">
      <button id="tapBtn">
        <span id="tapCoin">🪙</span>
        <span class="tap-label">TAP TO EARN</span>
      </button>
    </div>
    <div id="generators"></div>
    <div id="actionBar">
      <button id="prestigeBtn">🔄 Prestige</button>
    </div>
    <div class="progress-bar">
      <span>Lv.<span id="playerLevel">1</span></span>
      <div class="bar"><div class="fill" id="xpFill" style="width:0%"></div></div>
    </div>
  </div>

  <div id="notification"></div>

  <script src="visuals.js"></script>
  <script src="progression.js"></script>
  <script src="shop.js"></script>
  <script src="ads-manager.js"></script>
  <script src="challenges-system.js"></script>
  <script src="store-rotator.js"></script>
  <script src="retention-system.js"></script>
  <script src="collectibles-system.js"></script>
  <script src="tutorial-system.js"></script>
  <script src="game.js"></script>
</body>
</html>
